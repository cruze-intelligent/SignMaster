<!DOCTYPE html>
<html>
<head>
  <title>Icon Converter</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    canvas { border: 1px solid #ccc; margin: 10px; }
    button { padding: 10px 20px; margin: 10px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>SignMaster Icon Generator</h1>
  <p>Click buttons to generate PNG icons from SVG</p>
  
  <button onclick="generateIcon(192)">Generate 192x192 PNG</button>
  <button onclick="generateIcon(512)">Generate 512x512 PNG</button>
  
  <div id="output"></div>

  <script>
    function generateIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      
      // Red background
      ctx.fillStyle = '#D90000';
      ctx.fillRect(0, 0, size, size);
      
      // Yellow circle
      ctx.fillStyle = '#FCDC04';
      ctx.beginPath();
      ctx.arc(size/2, size/2, size * 0.3125, 0, Math.PI * 2);
      ctx.fill();
      
      // Hand emoji
      ctx.font = `${size * 0.416}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🤟', size/2, size * 0.52);
      
      // SignMaster text
      ctx.fillStyle = '#FFFFFF';
      ctx.font = `bold ${size * 0.083}px Arial`;
      ctx.fillText('SignMaster', size/2, size * 0.885);
      
      if (size === 512) {
        ctx.fillStyle = '#FCDC04';
        ctx.font = `${size * 0.047}px Arial`;
        ctx.fillText('Learn USL', size/2, size * 0.947);
      }
      
      // Download
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `icon-${size}.png`;
        a.click();
        
        // Show preview
        const img = document.createElement('img');
        img.src = url;
        img.style.width = '200px';
        document.getElementById('output').appendChild(img);
      });
    }
  </script>
</body>
</html>
